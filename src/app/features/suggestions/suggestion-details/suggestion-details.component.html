<div *ngIf="suggestion">
  <h2>{{ suggestion.title }}</h2>
  <p><strong>Description :</strong> {{ suggestion.description }}</p>
  <p><strong>Catégorie :</strong> {{ suggestion.category }}</p>
  <p><strong>Date :</strong> {{ suggestion.date | date:'dd/MM/yyyy' }}</p>
  <p><strong>Statut :</strong> {{ getStatusLabel(suggestion.status) }}</p>
  <p><strong>J'aime :</strong> {{ suggestion.nbLikes }}</p>
  <button (click)="goBack()">Retour à la liste</button>
  <button (click)="updateSuggestion()">Modifier</button>
</div>
<div *ngIf="!suggestion">
  <p>Suggestion non trouvée.</p>
  <button (click)="goBack()">Retour à la liste</button>
</div>
