<h2>{{ isEditMode ? 'Update Suggestion' : 'Add New Suggestion' }}</h2>
<form (ngSubmit)="onSubmit()">
  <div>
    <label for="title">Title:</label>
    <input type="text" id="title" [(ngModel)]="suggestion.title" name="title" required>
  </div>
  <div>
    <label for="description">Description:</label>
    <textarea id="description" [(ngModel)]="suggestion.description" name="description" required></textarea>
  </div>
  <div>
    <label for="category">Category:</label>
    <input type="text" id="category" [(ngModel)]="suggestion.category" name="category" required>
  </div>
  <div>
    <label for="status">Status:</label>
    <select id="status" [(ngModel)]="suggestion.status" name="status">
      <option value="en_attente">En attente</option>
      <option value="acceptee">Acceptée</option>
      <option value="refusee">Refusée</option>
    </select>
  </div>
  <div>
    <button type="submit">Save</button>
    <button type="button" (click)="goBack()">Cancel</button>
  </div>
</form>
