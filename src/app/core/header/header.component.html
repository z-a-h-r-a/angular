<header class="header">
  <div class="container">
    <h1>💡 Application de Gestion des Suggestions</h1>
    <p>Recueillez, gérez et suivez les suggestions des étudiants et du personnel du campus.</p>
    <!-- Left side -->
    <button class="btn btn-outline-primary" routerLink="/">
      🏠 Accueil
    </button>

    <!-- Right side -->
    <nav class="nav-links">
      <a routerLink="/home" routerLinkActive="active">Accueil</a>
      <a routerLink="/suggestions" routerLinkActive="active">Suggestions</a>
      
      <!-- Auth buttons -->
      @if (authService.isLoggedIn()) {
        <a routerLink="/users/profile" routerLinkActive="active">👤 Profil</a>
        <button class="btn btn-outline-danger" (click)="signOut()">🚪 Déconnexion</button>
      } @else {
        <a routerLink="/auth/sign-in" routerLinkActive="active" class="btn btn-primary">Connexion</a>
      }
    </nav>
  </div>
</header>
